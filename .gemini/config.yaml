pull_request_opened:
  summary: true
  code_review: true
  help: false
  include_drafts: false
  ignore_patterns:
    - '**/*.lock'
    - '**/package-lock.json'
    - '**/node_modules/**'
    - '**/dist/**'

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 8

have_fun: false

memory_config:
  disabled: false
